name: Course Automation Delivery Engine

on:
  schedule:
    # Runs everyday at 23:00 UTC (11:00 PM)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger within GitHub interface for testing

jobs:
  deliver_content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-numeric-version: '3.11'
        cache: 'pip'

    - name: Install Runtime Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Content Delivery Script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python src/main.py
